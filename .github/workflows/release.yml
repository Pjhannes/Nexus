name: Build Nexus (Windows + macOS)

# Baut die verteilbaren Installer auf den passenden Betriebssystemen.
# - Windows-Installer (NSIS + Portable) auf einem Windows-Runner
# - macOS-DMG (arm64 + x64) auf einem macOS-Runner  <-- KEIN eigener Mac noetig
#
# Ausloeser:
#   - Tag pushen (z. B.  git tag v0.4.0 && git push --tags )  -> baut + haengt an einen (Draft-)Release
#   - manuell ueber "Run workflow" (workflow_dispatch)         -> baut nur Artefakte
#
# Signierung ist bewusst AUS (keine Zertifikate). Die App wird per Electron-Fuses
# (scripts/afterPack.cjs) gehaertet; macOS bekommt eine Ad-hoc-Signatur.

# Seit R25 (Tauri-Migration): Dieser Workflow baut NUR NOCH die Electron-
# Bruecken-Releases der 0.x-Reihe (letztes geplantes: 0.6.0 mit dem
# "Nexus 1.0 verfuegbar"-Hinweis). Die Tauri-Generation (>= 1.0.0) baut
# .github/workflows/tauri-release.yml auf Tags v1* aufwaerts.
on:
  push:
    tags: ['v0.*']
  workflow_dispatch:

permissions:
  contents: write          # noetig, um den Release zu erstellen/zu beschreiben

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows
            args: --win nsis portable
          - os: macos-14
            name: macos
            args: --mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20      # nur fuer das Build-Tool; die App laeuft auf Electrons eigenem Node
          cache: npm

      - name: Dependencies installieren
        run: npm ci

      # Bei einem Tag-Push (v0.3.2) die package.json-Version aus dem Tag setzen.
      # electron-builder benennt die Installer nach package.json#version – ohne das
      # heissen die Dateien nach der (evtl. veralteten) Versionsnummer im Quellcode.
      # shell: bash laeuft auf beiden Runnern (Windows-Runner liefert Git-Bash mit).
      - name: Version aus Git-Tag setzen
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Setze package.json-Version auf $VERSION (Tag: $GITHUB_REF_NAME)"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # Bei einem Tag-Push: electron-builder laedt die Installer + die Auto-Update-
      # Metadaten (latest.yml / latest-mac.yml) + .blockmap direkt an einen GitHub-
      # Release. electron-builder legt den Release als DRAFT an -> du gibst ihn manuell
      # frei (Kontroll-Gate). Erst nach dem Freigeben sehen installierte Apps das Update.
      # Bei workflow_dispatch (kein Tag) wird nur gebaut, nicht veröffentlicht.
      - name: Build (electron-builder)
        run: npx electron-builder ${{ matrix.args }} --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false   # nicht versehentlich signieren (unsigniert gewollt)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # eingebauter Token; contents:write ist oben gesetzt

      - name: Artefakte hochladen
        uses: actions/upload-artifact@v4
        with:
          name: nexus-${{ matrix.name }}
          if-no-files-found: warn
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.blockmap
            dist/*.yml
